<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riuam - Discord Login Only</title>
    <style>
        :root { --primary: #5865F2; --bg: #0e0e0e; --card: #161616; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0e0e0e 100%); }
        .container { text-align: center; background: var(--card); padding: 50px 40px; border-radius: 24px; width: 350px; border: 1px solid #252525; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        h1 { font-size: 42px; font-weight: 900; letter-spacing: 6px; margin-bottom: 35px; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .discord-btn { display: block; text-decoration: none; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 16px; transition: 0.3s; background-color: #5865F2; color: white; box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3); }
        .discord-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(88, 101, 242, 0.5); background-color: #4752c4; }
        .footer { margin-top: 30px; font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RIUAM</h1>
        <a href="https://discord.com/api/oauth2/authorize?client_id=1488507067672035369&redirect_uri=https%3A%2F%2Friuam-auth.web.app%2Fdiscord.html&response_type=token&scope=identify+guilds.members.read" class="btn discord-btn">Login with Discord</a>
        <p class="footer">Powered by Riuam Collective</p>
    </div>
</body>
</html>
